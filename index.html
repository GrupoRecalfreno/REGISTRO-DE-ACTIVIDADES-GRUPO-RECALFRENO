<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GESTIÓN DE ACTIVIDADES - RECALFRENO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --odoo-primary: #714B67;
            --odoo-secondary: #017e84;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #4c4c4c;
            --border-color: #dee2e6;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 20px; margin: 0; line-height: 1.4; }
        .container { max-width: 1100px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); position: relative; }
        .titulo-principal { color: var(--odoo-primary); font-size: 36px; font-weight: 700; margin-bottom: 5px; border-bottom: 3px solid var(--odoo-primary); display: inline-block; }
        
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 13px; color: #333; text-transform: uppercase; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; font-size: 15px; margin-top: 5px; border: 1px solid var(--border-color); border-radius: 4px; background-color: #f9f9f9; box-sizing: border-box; }
        
        #codigoRow { display: flex; align-items: center; flex-wrap: wrap; gap: 15px; margin-top: 5px; }
        #codigo { width: 120px; font-weight: bold; text-align: center; font-size: 18px; }
        
        #nombreResponsable { font-size: 20px; font-weight: 700; color: var(--odoo-secondary); text-transform: uppercase; }
        #alertaVencidos { font-size: 16px; font-weight: 800; color: #dc3545; margin-left: 5px; }

        .botones-alineados { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        button { padding: 10px 18px; font-size: 12px; font-weight: 600; border-radius: 4px; cursor: pointer; border: 1px solid transparent; text-transform: uppercase; }
        .inicio { background-color: var(--odoo-secondary); color: white; }
        .buscar { background-color: #e9ecef; color: #495057; border: 1px solid #ced4da; }
        .fin { background-color: #dc3545; color: white; }
        .exportar { background-color: #714B67; color: white; }

        .grid-doble { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .factura-container { padding: 15px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.05); position: relative; }
        
        .bg-prohinsa { background-color: #FFF4E5; border-left: 5px solid #F8AA19; }
        .bg-proverepuestos { background-color: #FFE5E5; border-left: 5px solid #EC1A39; }
        .bg-recalfreno { background-color: #E5F0FF; border-left: 5px solid #17509D; }
        .bg-porland { background-color: #FFF0E5; border-left: 5px solid #F87B1E; }
        .bg-revision { background-color: #F3E5F5; border-left: 5px solid #714B67; }

        .sugerencias-lista { position: absolute; z-index: 100; background: white; border: 1px solid #ccc; width: 95%; max-height: 150px; overflow-y: auto; list-style: none; padding: 0; margin: 0; border-radius: 0 0 4px 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .sugerencias-lista li { padding: 8px 12px; cursor: pointer; font-size: 13px; }
        .sugerencias-lista li:hover { background-color: #f1f1f1; color: var(--odoo-secondary); }

        .fila-vencida { background-color: #FFD580 !important; font-weight: 600; }
        .tabla-container-fija { margin-top: 40px; border-top: 3px solid var(--odoo-primary); padding-top: 20px; }
        #tareasPendientesTable { width: 100%; border-collapse: collapse; background: white; }
        #tareasPendientesTable thead { background-color: var(--odoo-primary); color: white; }
        #tareasPendientesTable th, td { padding: 12px; border: 1px solid #eee; text-align: left; font-size: 12px; }

        .alineado { display: flex; align-items: center; gap: 8px; background: #fff; padding: 6px 10px; border: 1px solid #eee; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .hidden { display: none; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="titulo-principal">GRUPO RECALFRENO</h1>
        <form id="actividadForm" onsubmit="return false;">
            <label>Código Personal</label>
            <div id="codigoRow">
                <input type="text" id="codigo" maxlength="4" placeholder="A123" style="text-transform: uppercase;" onkeyup="verificarCodigoPersonal()" />
                <span id="nombreResponsable"></span>
                <span id="alertaVencidos"></span>
            </div>

            <div class="botones-alineados">
                <button type="button" onclick="registrarInicio()" class="inicio">Iniciar Tarea</button>
                <button type="button" onclick="buscarTarea()" class="buscar">Buscar Mis Pendientes</button>
                <button type="button" onclick="finalizarTarea()" class="fin">Finalizar Tarea</button>
                <button type="button" onclick="exportarExcel()" class="exportar">EXPORTAR EXCEL</button>
            </div>

            <div id="seccionSeleccion">
                <label>Seleccionar Actividad</label>
                <select id="actividad" onchange="mostrarCamposExtras()">
                    <option value="">-- SELECCIONE --</option>
                    <option value="REVISION">REVISION</option>
                    <option>RUTA SUR</option><option>RUTA NORTE</option><option>RUTA VALLE</option>
                    <option>RUTA TERMINAL</option><option>RETIRO DE OFICINA</option>
                    <option>ORTIZ EXPRESS</option><option>ENETSA</option>
                    <option>OTRO TRANSPORTE O RUTA</option>
                    <option value="GESTION DE BODEGA">GESTION DE BODEGA</option>
                </select>

                <div id="bodegaExtra" class="hidden">
                    <label>Tareas Bodega</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;">
                        <label class="alineado"><input type="radio" name="tareaBodega" value="PERCHADO"> PERCHADO</label>
                        <label class="alineado"><input type="radio" name="tareaBodega" value="EMPACADO"> EMPACADO</label>
                        <label class="alineado"><input type="radio" name="tareaBodega" value="CORTAR MANGUERA"> CORTAR MANGUERA</label>
                        <label class="alineado"><input type="radio" name="tareaBodega" value="TOMAR FOTOS"> TOMAR FOTOS</label>
                        <label class="alineado"><input type="radio" name="tareaBodega" value="LIMPIEZA"> LIMPIEZA</label>
                        <label class="alineado"><input type="radio" name="tareaBodega" value="ARREGLO DE PERCHAS"> ARREGLO DE PERCHAS</label>
                        <label class="alineado"><input type="radio" name="tareaBodega" value="INVENTARIO"> INVENTARIO</label>
                        <label class="alineado"><input type="radio" name="tareaBodega" value="OTROS" onchange="document.getElementById('campoOtros').classList.toggle('hidden', !this.checked)"> OTROS</label>
                    </div>
                    <div id="campoOtros" class="hidden"><input type="text" id="tareaOtros" placeholder="ESPECIFIQUE..." style="text-transform: uppercase; margin-top:5px;" /></div>
                </div>

                <div id="camposExtras" class="hidden">
                    <div id="facturas" class="grid-doble"></div>
                </div>
            </div>

            <div id="checklistTareas" class="hidden">
                <label style="color: var(--odoo-primary); border-bottom: 2px solid var(--odoo-primary); padding-bottom: 5px;">MIS ACTIVIDADES EN CURSO</label>
                <div id="listaTareas" style="margin-top:10px;"></div>
            </div>

            <div class="tabla-container-fija">
                <h3 style="color: var(--odoo-primary); font-size: 20px;">ACTIVIDADES PENDIENTES</h3>
                <table id="tareasPendientesTable">
                    <thead><tr><th>CÓDIGO</th><th>NOMBRE</th><th>INICIO (FECHA/HORA)</th><th>ACTIVIDAD</th></tr></thead>
                    <tbody id="tbodyPendientes"></tbody>
                </table>
            </div>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBrYf-uqL-QY71vsNM560YqgAKRlTi1M0U",
            authDomain: "registro-de-actividades-25c73.firebaseapp.com",
            databaseURL: "https://registro-de-actividades-25c73-default-rtdb.firebaseio.com/",
            projectId: "registro-de-actividades-25c73",
            storageBucket: "registro-de-actividades-25c73.appspot.com",
            messagingSenderId: "584517049071",
            appId: "1:584517049071:web:2102394072488f637cd91a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let personalNombresGlobal = {};
        let actividadesGlobales = {};

        db.ref("personal").once("value").then(s => { 
            personalNombresGlobal = s.val() || {}; 
            cargarTablaGlobal();
        });

        function verificarCodigoPersonal() {
            const cod = document.getElementById("codigo").value.toUpperCase();
            const span = document.getElementById("nombreResponsable");
            const alerta = document.getElementById("alertaVencidos");
            if (personalNombresGlobal[cod]) {
                span.textContent = personalNombresGlobal[cod];
                let cont = 0; const hoy = new Date();
                if (actividadesGlobales[cod]) {
                    for (let k in actividadesGlobales[cod]) {
                        let t = actividadesGlobales[cod][k];
                        if (t.estado !== "finalizado" && (hoy - new Date(t.timestamp)) / 86400000 > 5) cont++;
                    }
                }
                alerta.textContent = cont > 0 ? `⚠️ TIENES ${cont} ACTIVIDADES VENCIDAS 👎` : "";
            } else { span.textContent = ""; alerta.textContent = ""; }
        }

        function mostrarCamposExtras() {
            const act = document.getElementById("actividad").value;
            const extras = document.getElementById("camposExtras");
            const bodega = document.getElementById("bodegaExtra");
            const cont = document.getElementById("facturas");
            cont.innerHTML = "";
            
            if (act === "GESTION DE BODEGA") {
                extras.classList.add("hidden"); bodega.classList.remove("hidden");
            } else if (act !== "") {
                extras.classList.remove("hidden"); bodega.classList.add("hidden");
                const marcas = act === "REVISION" ? ["REVISION"] : ["PROHINSA", "PROVEREPUESTOS", "RECALFRENO", "PORLAND"];
                marcas.forEach(m => {
                    let colorClass = "bg-" + m.toLowerCase();
                    let html = `<div class="factura-container ${colorClass}"><label>${m}</label>
                                <input type="text" id="factura${m}" maxlength="7" placeholder="S123456" style="text-transform: uppercase;" />
                                <label>CANT/ITEMS</label>
                                <input type="number" id="items${m}" min="0" value="0" />`;
                    if(m === "REVISION") {
                        html += `<label>NOMBRE DE QUIEN SEPARÓ EL PEDIDO</label>
                                 <input type="text" id="inputSeparador" placeholder="Busque por nombre..." style="text-transform: uppercase;" onkeyup="autocompletarNombre(this)">
                                 <ul id="sugerencias" class="sugerencias-lista hidden"></ul>`;
                    }
                    html += `</div>`;
                    cont.innerHTML += html;
                });
            } else { extras.classList.add("hidden"); bodega.classList.add("hidden"); }
        }

        function autocompletarNombre(input) {
            const val = input.value.toUpperCase();
            const lista = document.getElementById("sugerencias");
            lista.innerHTML = "";
            if(!val) { lista.classList.add("hidden"); return; }
            const coincidencias = Object.values(personalNombresGlobal).filter(n => n.includes(val));
            if(coincidencias.length > 0) {
                lista.classList.remove("hidden");
                coincidencias.forEach(nombre => {
                    const li = document.createElement("li"); li.textContent = nombre;
                    li.onclick = () => { input.value = nombre; lista.classList.add("hidden"); };
                    lista.appendChild(li);
                });
            } else { lista.classList.add("hidden"); }
        }

        function registrarInicio() {
            const cod = document.getElementById("codigo").value.toUpperCase();
            const act = document.getElementById("actividad").value;
            if (!personalNombresGlobal[cod] || !act) { alert("DATOS INCOMPLETOS"); return; }
            
            let d = { 
                codigo: cod, 
                actividad: act, 
                timestamp: new Date().toISOString(), 
                estado: "pendiente" 
            };
            
            if (act === "GESTION DE BODEGA") {
                const s = document.querySelector('input[name="tareaBodega"]:checked');
                if (!s) { alert("Seleccione tarea de bodega"); return; }
                d.actividadBodega = s.value === "OTROS" ? document.getElementById("tareaOtros").value.toUpperCase() : s.value;
            } else if (act === "REVISION") {
                d.facturaRevision = document.getElementById("facturaREVISION").value.toUpperCase();
                d.numFacturasRevision = parseInt(document.getElementById("itemsREVISION").value) || 0;
                d.nombreSeparador = document.getElementById("inputSeparador").value.toUpperCase();
            } else {
                const marcas = ["PROHINSA", "PROVEREPUESTOS", "RECALFRENO", "PORLAND"];
                marcas.forEach(m => {
                    d[`factura${m}`] = document.getElementById(`factura${m}`).value.toUpperCase() || "";
                    d[`items${m}`] = parseInt(document.getElementById(`items${m}`).value) || 0;
                });
            }

            db.ref("actividades/" + cod).push(d).then(() => { alert("REGISTRADO"); location.reload(); });
        }

        function buscarTarea() {
            const cod = document.getElementById("codigo").value.toUpperCase();
            if (!cod || !personalNombresGlobal[cod]) { alert("INGRESE CÓDIGO"); return; }
            document.getElementById("seccionSeleccion").classList.add("hidden");
            db.ref("actividades/" + cod).once("value").then(s => {
                const data = s.val(); const lista = document.getElementById("listaTareas");
                lista.innerHTML = ""; let hay = false;
                if (data) {
                    for (let k in data) {
                        if (data[k].estado !== "finalizado") {
                            hay = true;
                            const l = document.createElement("label"); l.className = "alineado";
                            l.innerHTML = `<input type="radio" name="tareaSel" value="${k}"> ${data[k].actividad} (${new Date(data[k].timestamp).toLocaleString()})`;
                            lista.appendChild(l);
                        }
                    }
                }
                if (hay) document.getElementById("checklistTareas").classList.remove("hidden");
                else { alert("SIN PENDIENTES"); location.reload(); }
            });
        }

        function finalizarTarea() {
            const cod = document.getElementById("codigo").value.toUpperCase();
            const sel = document.querySelector('input[name="tareaSel"]:checked');
            if (!sel) { alert("Seleccione una tarea"); return; }
            db.ref(`actividades/${cod}/${sel.value}`).update({ 
                estado: "finalizado", 
                timestampFinalizacion: new Date().toISOString() 
            }).then(() => { alert("FINALIZADA"); location.reload(); });
        }

        function cargarTablaGlobal() {
            const tb = document.getElementById("tbodyPendientes");
            const hoy = new Date();
            db.ref("actividades").on("value", s => {
                actividadesGlobales = s.val() || {}; 
                let p = []; tb.innerHTML = "";
                for (let c in actividadesGlobales) { for (let k in actividadesGlobales[c]) { if (actividadesGlobales[c][k].estado !== "finalizado") p.push(actividadesGlobales[c][k]); } }
                p.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                p.forEach(t => {
                    const tr = document.createElement("tr");
                    const f = new Date(t.timestamp);
                    if ((hoy - f) / 86400000 > 5) tr.className = "fila-vencida";
                    let desc = t.actividad;
                    if(t.nombreSeparador) desc += ` (Sep: ${t.nombreSeparador})`;
                    else if(t.actividadBodega) desc += ` (${t.actividadBodega})`;
                    tr.innerHTML = `<td>${t.codigo}</td><td>${personalNombresGlobal[t.codigo] || ''}</td><td>${f.toLocaleString()}</td><td>${desc}</td>`;
                    tb.appendChild(tr);
                });
            });
        }

        function exportarExcel() {
            const c = prompt("CLAVE:");
            if (c !== "6607") return;
            db.ref("actividades").once("value").then(s => {
                const data = s.val();
                let sheet1 = [], sheet2 = [], sheet3 = [];

                for (let cod in data) {
                    for (let k in data[cod]) {
                        const t = data[cod][k];
                        const base = {
                            "CODIGO TRABAJADOR": t.codigo,
                            "NOMBRE TRABAJADOR": personalNombresGlobal[t.codigo] || "",
                            "ACTIVIDAD": t.actividad,
                            "ESTADO": t.estado,
                            "INICIO (FECHA/HORA)": t.timestamp ? new Date(t.timestamp).toLocaleString() : "",
                            "FINALIZACION (FECHA/HORA)": t.timestampFinalizacion ? new Date(t.timestampFinalizacion).toLocaleString() : ""
                        };

                        if (t.actividad === "GESTION DE BODEGA") {
                            sheet2.push({ ...base, "ACTIVIDAD BODEGA": t.actividadBodega || "" });
                        } else if (t.actividad === "REVISION") {
                            sheet3.push({ 
                                ...base, 
                                "NUM FACTURA": t.facturaRevision || "", 
                                "CANTIDAD": t.numFacturasRevision || 0,
                                "SEPARADOR": t.nombreSeparador || ""
                            });
                        } else {
                            sheet1.push({
                                ...base,
                                "FAC PROHINSA": t.facturaPROHINSA || "", "CANT PROHINSA": t.itemsPROHINSA || 0,
                                "FAC PROVEREPUESTOS": t.facturaPROVEREPUESTOS || "", "CANT PROVEREPUESTOS": t.itemsPROVEREPUESTOS || 0,
                                "FAC RECALFRENO": t.facturaRECALFRENO || "", "CANT RECALFRENO": t.itemsRECALFRENO || 0,
                                "FAC PORLAND": t.facturaPORLAND || "", "CANT PORLAND": t.itemsPORLAND || 0
                            });
                        }
                    }
                }

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheet1), "RUTAS Y OTROS");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheet2), "GESTION DE BODEGA");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheet3), "REVISION");
                XLSX.writeFile(wb, "Reporte_Actividades_Recalfreno.xlsx");
            });
        }
    </script>
</body>
</html>
